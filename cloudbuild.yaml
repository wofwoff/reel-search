substitutions:
  _REGION: us-central1
  _REPO: cloud-run-source-deploy
  _SERVICE_ACCOUNT: reel-search-run@reel-search-500906.iam.gserviceaccount.com
  _API_URL: https://reel-search-api-771696730702.us-central1.run.app
  _FRONTEND_URL: https://reel-search-frontend-771696730702.us-central1.run.app
  _SUPABASE_URL: https://jxerusovqqvpkibygrem.supabase.co
  _SUPABASE_ANON_KEY: sb_publishable__jih2UywChZ9v3ZIiLwziw_xCBwR4af

steps:
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/reel-search-api:$SHORT_SHA
      - backend
    waitFor: ['-']

  - id: build-frontend-assets
    name: node:20
    entrypoint: npm
    args: ['ci']
    dir: frontend
    waitFor: ['-']

  - id: build-frontend-dist
    name: node:20
    entrypoint: npm
    args: ['run', 'build']
    dir: frontend
    env:
      - 'VITE_API_BASE_URL=${_API_URL}'
      - 'VITE_SUPABASE_URL=${_SUPABASE_URL}'
      - 'VITE_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}'
    waitFor: ['build-frontend-assets']

  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/reel-search-frontend:$SHORT_SHA
      - frontend
    waitFor: ['build-frontend-dist']

  - id: push-api
    name: gcr.io/cloud-builders/docker
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/reel-search-api:$SHORT_SHA']
    waitFor: ['build-api']

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/reel-search-frontend:$SHORT_SHA']
    waitFor: ['build-frontend']

  - id: deploy-api
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - reel-search-api
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/reel-search-api:$SHORT_SHA
      - --region=${_REGION}
      - --service-account=${_SERVICE_ACCOUNT}
      - --update-env-vars=FRONTEND_ORIGIN=${_FRONTEND_URL}
    waitFor: ['push-api']

  - id: deploy-frontend
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - reel-search-frontend
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/reel-search-frontend:$SHORT_SHA
      - --region=${_REGION}
      - --service-account=${_SERVICE_ACCOUNT}
    waitFor: ['push-frontend']

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/reel-search-api:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/reel-search-frontend:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
