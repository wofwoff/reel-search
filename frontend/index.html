<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fff8f6" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>ReelMind | Turn scrolls into insights.</title>
    
    <!-- Tailwind CSS CDN with plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#4a4641",
              "surface": "#fff8f6",
              "primary-container": "#ff9e7d",
              "outline-variant": "#dac1ba",
              "primary-fixed": "#ffdbd0",
              "surface-container-highest": "#f0dfd9",
              "on-surface-variant": "#54433d",
              "tertiary-fixed": "#bcedda",
              "tertiary-fixed-dim": "#a1d1bf",
              "on-primary-fixed-variant": "#763219",
              "secondary-container": "#e5dfd7",
              "on-primary": "#ffffff",
              "secondary-fixed-dim": "#ccc6be",
              "on-primary-fixed": "#390c00",
              "on-secondary-container": "#66625c",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#002118",
              "inverse-surface": "#382e2a",
              "inverse-on-surface": "#ffede7",
              "surface-tint": "#94492e",
              "surface-container-high": "#f6e5df",
              "tertiary": "#3a6758",
              "secondary": "#625e58",
              "surface-dim": "#e8d6d1",
              "on-primary-container": "#78331a",
              "surface-container": "#fceae4",
              "outline": "#87736c",
              "background": "#fff8f6",
              "on-background": "#221a16",
              "tertiary-container": "#92c1af",
              "primary-fixed-dim": "#ffb59c",
              "on-tertiary-container": "#225042",
              "error": "#ba1a1a",
              "surface-variant": "#f0dfd9",
              "on-surface": "#221a16",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "inverse-primary": "#ffb59c",
              "secondary-fixed": "#e8e1da",
              "primary": "#94492e",
              "on-tertiary": "#ffffff",
              "surface-container-low": "#fff1ec",
              "on-secondary-fixed": "#1e1b17",
              "on-secondary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "surface-bright": "#fff8f6",
              "on-tertiary-fixed-variant": "#214f41"
            },
            borderRadius: {
              "DEFAULT": "1rem",
              "lg": "2rem",
              "xl": "3rem",
              "full": "9999px"
            },
            spacing: {
              "gutter": "24px",
              "margin-desktop": "48px",
              "container-max": "1200px",
              "base": "8px",
              "margin-mobile": "16px"
            },
            fontFamily: {
              "body-md": ["Outfit"],
              "headline-sm": ["Outfit"],
              "label-md": ["Outfit"],
              "headline-lg": ["Outfit"],
              "headline-md": ["Outfit"],
              "headline-lg-mobile": ["Outfit"],
              "body-lg": ["Outfit"],
              "label-sm": ["Outfit"]
            },
            fontSize: {
              "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
              "headline-sm": ["24px", {"lineHeight": "1.4", "fontWeight": "500"}],
              "label-md": ["14px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],
              "headline-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
              "headline-md": ["32px", {"lineHeight": "1.3", "fontWeight": "500"}],
              "headline-lg-mobile": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
              "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
              "label-sm": ["12px", {"lineHeight": "1.0", "fontWeight": "500"}]
            }
          }
        }
      };
    </script>
    <style>
      body {
        font-family: 'Outfit', sans-serif;
        background-color: #fff8f6;
        color: #221a16;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      .soft-glow-focus:focus-within {
        box-shadow: 0 0 20px 4px rgba(148, 73, 46, 0.15);
        transition: all 0.3s ease;
      }
      .bouncy-interaction:active {
        transform: scale(0.97);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #dac1ba;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
